data:
  data_dir: /data0/yzhen/data/lung_pe_v1/npz_v1
  split_dir: ./splits
  num_slices: 3
  image_size: 256
  hu_min: -550.0
  hu_max: 250.0
  num_workers: 24
  aug_prob: 0.5
  max_angle: 15.0
  scale_range: 0.1
  translate_frac: 0.05
  noise_std: 0.09
  brightness_range: 0.1
  contrast_range: 0.1
  lung_sample_bias: 0.0
  ncct_degrade_prob: 0.0
vae:
  in_channels: 3
  out_channels: 3
  z_channels: 4
  embed_dim: 4
  ch: 128
  ch_mult:
  - 1
  - 2
  - 4
  - 4
  num_res_blocks: 2
  attn_resolutions:
  - 32
  dropout: 0.0
  resolution: 256
  double_z: true
vae_gan:
  enabled: true
  ndf: 64
  n_layers: 3
  use_spectral_norm: true
  gan_loss_type: hinge
  gan_weight: 0.5
  adaptive_weight: true
  adaptive_weight_max: 10.0
  feat_match_weight: 0.0
  perceptual_weight: 1.0
  lr: 0.0001
  grad_clip_norm: 1.0
  disc_start_epoch: 5
  r1_gamma: 0.0
  r1_interval: 16
vae_train:
  batch_size: 4
  num_epochs: 100
  lr: 4.5e-06
  weight_decay: 0.0
  kl_weight: 1.0e-06
  l1_weight: 1.0
  perceptual_weight: 0.0
  lr_scheduler: cosine
  warmup_steps: 500
  ema_rate: 0.9999
  grad_clip_norm: 1.0
  save_interval: 10
  log_interval: 50
  val_interval: 1
  output_dir: ./outputs_vae
  resume_checkpoint: /data0/yzhen/a_test_model/v0/outputs_vae/checkpoint_epoch0030.pt
  seed: 42
unet:
  model_channels: 128
  channel_mult:
  - 1
  - 2
  - 4
  num_res_blocks: 2
  attention_resolutions:
  - 4
  - 2
  dropout: 0.0
  num_heads: 4
  use_scale_shift_norm: true
scheduler:
  num_train_timesteps: 1000
  beta_schedule: linear
  beta_start: 0.00085
  beta_end: 0.012
  prediction_type: epsilon
  num_inference_steps: 50
diffusion_train:
  batch_size: 2
  num_epochs: 200
  lr: 0.0001
  weight_decay: 0.0
  lr_scheduler: cosine
  warmup_steps: 500
  ema_rate: 0.9999
  grad_clip_norm: 1.0
  save_interval: 10
  log_interval: 50
  val_interval: 1
  output_dir: ./outputs_diffusion
  resume_checkpoint: ''
  pretrained_vae: /data0/yzhen/a_test_model/v0/outputs_vae/checkpoint_epoch0030.pt
  seed: 42
