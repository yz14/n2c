# Recommended config for NCCT→CTA training with GAN
#
# Phase 2 config: G pretrained, D enabled with stability fixes.
#
# Key improvements:
#   1. D gradient leak FIX: D params frozen during G backward (in trainer.py)
#   2. D warmup: pre-train D for 500 steps before joint training
#   3. D warmup LR FIX: manually set D LR to base rate during warmup
#   4. D weight init: normal_(0, 0.02) standard GAN initialization
#   5. d_cond_mode=diff: D sees (image-ncct) to isolate contrast enhancement signal
#      This is CRITICAL for NCCT→CTA where raw images are nearly identical.
#   6. Lung-aware sampling: bias=2.0 ensures slices contain lung/vessel regions
#   7. Progressive GAN weight: 0→0.1 over 10 epochs (prevents G destabilization)
#   8. Feature matching loss: stable gradient signal (weight=10.0)
#   9. VGG perceptual loss: directly improves sharpness (weight=0.5)
#  10. DiffAugment: prevents D overfitting
#  11. Lower R1 gamma (1.0 vs 10.0): gentler D regularization
#  12. Lower gan_weight (0.1 vs 1.0): GAN doesn't overwhelm reconstruction
#  13. D gradient clipping (1.0): extra safety for D stability

data:
  data_dir: /data0/yzhen/data/lung_pe_v1/npz_v1
  split_dir: ./splits
  num_slices: 3
  image_size: 256
  hu_min: -1024.0
  hu_max: 600.0
  num_workers: 24
  aug_prob: 0.5
  max_angle: 15.0
  scale_range: 0.1
  translate_frac: 0.05
  noise_std: 0.02
  brightness_range: 0.1
  contrast_range: 0.1
  lung_sample_bias: 2.0            # Lung-aware sampling: strongly prefer lung slices (0=uniform)
model:
  in_channels: 3
  out_channels: 3
  model_channels: 64
  channel_mult:
  - 1
  - 2
  - 4
  - 8
  num_res_blocks: 2
  attention_resolutions:
  - 4
  - 8
  dropout: 0.0
  use_checkpoint: false
  num_heads: 4
  num_head_channels: -1
  use_scale_shift_norm: false
  conv_resample: true
  resblock_updown: false
  use_fp16: false
  residual_output: true
registration:
  enabled: false
  nb_features:
  - 16
  - 32
  - 32
  - 32
  integration_steps: 7
  smoothness_weight: 1.0
  smoothness_penalty: l2
  lr: 0.0001
discriminator:
  enabled: true
  ndf: 64
  n_layers: 3
  num_D: 2                       # 2 scales (was 3 — less D capacity = harder to collapse)
  use_spectral_norm: true
  gan_weight: 0.1                # LOW: GAN must not overwhelm recon loss (~0.45)
  feat_match_weight: 10.0        # Feature matching: stable, smooth gradient signal
  lr: 0.0004                     # TTUR: D_lr = 2× G_lr for better D training
  lr_scheduler: cosine
  warmup_steps: 500
  label_smoothing: 0.0
  grad_clip_norm_D: 1.0          # Clip D gradients for extra safety
  # --- Conditioning & loss ---
  d_cond_mode: diff              # Diff mode: D sees (image-ncct), isolating contrast enhancement signal
  gan_loss_type: lsgan            # LSGAN: more stable with the gradient leak fix
  r1_gamma: 1.0                  # GENTLE R1 (was 10.0 — too aggressive, flattened D)
  r1_interval: 16
  # --- Architecture ---
  disc_type: patchgan
  n_blocks_resD: 4
  use_attention: true
  # --- Training stability (NEW) ---
  gan_warmup_epochs: 10           # Ramp GAN weight from 0→gan_weight over 10 epochs
  d_warmup_steps: 500             # Pre-train D for 500 steps before joint training
  diffaugment_policy: "color,translation"  # DiffAugment: prevent D overfitting
  # --- Quality degradation negative samples for D ---
  d_quality_aug: "blur,noise,downsample"  # D sees degraded CTA as additional negatives
  d_quality_aug_prob: 0.5                 # 50% chance per D step
  d_quality_aug_weight: 0.5               # weight for quality D loss term
refine:
  enabled: false
  hidden_dim: 64
  num_blocks: 6
  lr: 0.0001
  lr_scheduler: cosine
  warmup_steps: 200
  freeze_G: true
train:
  batch_size: 4
  lr: 0.0002
  weight_decay: 0.0
  num_epochs: 200
  save_interval: 10
  log_interval: 50
  val_interval: 1
  l1_weight: 1.0
  ssim_weight: 1.0
  use_3d_ssim: false
  lung_weight: 10.0
  ema_rate: 0.999
  lr_scheduler: cosine
  warmup_steps: 500
  output_dir: ./outputs_gan_stable
  resume_checkpoint: ''
  seed: 42
  pretrained_G: ''                # Set to your pretrained G checkpoint path
  pretrained_R: ''
  pretrained_D: ''
  pretrained_G2: ''
  grad_clip_norm: 5.0
  grad_accumulation_steps: 1
  skip_warmup: false
  perceptual_weight: 0.5          # VGG perceptual loss for sharpness
