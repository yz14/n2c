data:
  data_dir: D:/codes/data/ncct_tiny
  split_dir: ./splits
  num_slices: 3
  image_size: 256
  hu_min: -1024.0
  hu_max: 3071.0
  num_workers: 4
  aug_prob: 0.5
  max_angle: 15.0
  scale_range: 0.1
  translate_frac: 0.05
  noise_std: 0.02
  brightness_range: 0.1
  contrast_range: 0.1
model:
  in_channels: 3
  out_channels: 3
  model_channels: 64
  channel_mult:
  - 1
  - 2
  - 4
  - 8
  num_res_blocks: 2
  attention_resolutions:
  - 4
  - 8
  dropout: 0.0
  use_checkpoint: false
  num_heads: 4
  num_head_channels: -1
  use_scale_shift_norm: false
  conv_resample: true
  resblock_updown: false
  use_fp16: false
  residual_output: true
registration:
  enabled: false
  nb_features:
  - 16
  - 32
  - 32
  - 32
  integration_steps: 7
  smoothness_weight: 1.0
  smoothness_penalty: l2
  lr: 0.0001
discriminator:
  enabled: true
  ndf: 64
  n_layers: 3
  num_D: 3
  use_spectral_norm: true
  gan_weight: 1.0
  feat_match_weight: 10.0
  lr: 0.0002
  lr_scheduler: cosine
  warmup_steps: 500
  label_smoothing: 0.1
  grad_clip_norm_D: 0.0
  d_cond_mode: concat
  gan_loss_type: lsgan
  r1_gamma: 10.0
  r1_interval: 16
  disc_type: patchgan
  n_blocks_resD: 4
  use_attention: true
  gan_warmup_epochs: 5
  d_warmup_steps: 0
  diffaugment_policy: ''
refine:
  enabled: false
  hidden_dim: 64
  num_blocks: 6
  lr: 0.0001
  lr_scheduler: cosine
  warmup_steps: 200
  freeze_G: true
train:
  batch_size: 2
  lr: 0.0001
  weight_decay: 0.0
  num_epochs: 200
  save_interval: 10
  log_interval: 50
  val_interval: 1
  l1_weight: 1.0
  ssim_weight: 1.0
  use_3d_ssim: true
  lung_weight: 10.0
  ema_rate: 0.999
  lr_scheduler: cosine
  warmup_steps: 500
  output_dir: ./outputs
  resume_checkpoint: ''
  seed: 42
  pretrained_G: ''
  pretrained_R: ''
  pretrained_D: ''
  pretrained_G2: ''
  grad_clip_norm: 5.0
  grad_accumulation_steps: 1
  skip_warmup: false
  perceptual_weight: 0.0
